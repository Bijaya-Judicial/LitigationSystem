<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Case</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background:#eef2f7;
    }

    .header {
        background:#1b263b;
        color:white;
        padding:12px 20px;
        display:flex;
        justify-content:space-between;
        align-items:center;
    }

    .form-box {
        width:50%;
        margin:40px auto;
        background:white;
        padding:25px;
        border-radius:10px;
        box-shadow:0px 0px 10px rgba(0,0,0,0.1);
    }

    h3 {
        text-align:center;
        margin-bottom:20px;
        color:#1b263b;
    }
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h5>Collectorate Litigation System - Puri</h5>
    <div>
        {{ session.get('user') }} | 
        <a href="/logout" class="text-white">Logout</a>
    </div>
</div>

<!-- FORM -->
<div class="form-box">

<h3>Edit Case</h3>

<form method="POST">

    <div class="mb-3">
        <label class="form-label">Case Number</label>
        <input name="case_no" value="{{case.case_no}}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Year</label>
        <input name="year" value="{{case.case_year}}" type="number" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Petitioner</label>
        <input name="petitioner" value="{{case.petitioner}}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Court</label>
        <select name="court" class="form-control" required>
            <option {{'selected' if case.court=='Supreme Court'}}>Supreme Court</option>
            <option {{'selected' if case.court=='High Court'}}>High Court</option>
            <option {{'selected' if case.court=='NGT Kolkata'}}>NGT Kolkata</option>
            <option {{'selected' if case.court=='NHRC'}}>NHRC</option>
            <option {{'selected' if case.court=='OHRC'}}>OHRC</option>
            <option {{'selected' if case.court=='Lokayukta'}}>Lokayukta</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Case Type</label>
        <select name="case_type" class="form-control" required>
            <option {{'selected' if case.case_type=='SLP'}}>SLP</option>
            <option {{'selected' if case.case_type=='WPC'}}>WPC</option>
            <option {{'selected' if case.case_type=='PIL'}}>PIL</option>
            <option {{'selected' if case.case_type=='CONTC'}}>CONTC</option>
            <option {{'selected' if case.case_type=='WA'}}>WA</option>
            <option {{'selected' if case.case_type=='IA'}}>IA</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Office</label>
        <select name="office" class="form-control" required>
            <option {{'selected' if case.office=='Tahasil Puri'}}>Tahasil Puri</option>
            <option {{'selected' if case.office=='Tahasil Kanas'}}>Tahasil Kanas</option>
            <option {{'selected' if case.office=='BDO Puri Sadar'}}>BDO Puri Sadar</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Next Hearing Date</label>
        <input type="date" name="next_hearing"
               value="{{case.next_hearing.strftime('%Y-%m-%d') if case.next_hearing else ''}}"
               class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary w-100">Update Case</button>

    <a href="/dashboard" class="btn btn-secondary w-100 mt-2">⬅ Back to Dashboard</a>

</form>

</div>

</body>
</html>
